upstream frg_backend {
    server app:8000;
    keepalive 8;
}

# Per-second: stops rapid refresh / hammering (SPA parallel load uses burst).
limit_req_zone $binary_remote_addr zone=frg_api_rps:10m rate=5r/s;
# Per-minute: sustained cap across the whole minute.
limit_req_zone $binary_remote_addr zone=frg_api_rpm:10m rate=60r/m;

# Direct browser navigation to /api/* (Accept: text/html) → SPA rate-limit page.
map $http_accept $frg_rate_limit_html {
    default 0;
    "~*text/html" 1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 1m;

    location /api/ {
        # Both limits apply; the stricter one triggers 429 first.
        limit_req zone=frg_api_rps burst=15 nodelay;
        limit_req zone=frg_api_rpm burst=10 nodelay;
        limit_req_status 429;
        limit_req_log_level warn;

        error_page 429 = @frg_rate_limit;

        proxy_pass http://frg_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location @frg_rate_limit {
        internal;
        if ($frg_rate_limit_html) {
            return 302 /too-many-requests;
        }
        default_type application/json;
        add_header Retry-After 60 always;
        return 429 '{"detail":"Too many requests"}';
    }

    location = /openapi.json {
        proxy_pass http://frg_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(docs|redoc) {
        proxy_pass http://frg_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
