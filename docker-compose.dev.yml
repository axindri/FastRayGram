x-postgres-tuning: &postgres-tuning
  - postgres
  - -c
  - shared_buffers=128MB
  - -c
  - effective_cache_size=256MB
  - -c
  - max_connections=30
  - -c
  - work_mem=4MB
  - -c
  - maintenance_work_mem=64MB
  - -c
  - max_worker_processes=2
  - -c
  - max_parallel_workers=1

x-postgres: &postgres
  image: postgres:17-alpine
  container_name: fast-ray-gram-postgres
  ports:
    - "${DB__PORT:-5432}:5432"
  env_file:
    - .env
  environment:
    POSTGRES_USER: ${DB__USER:-fastraygram}
    POSTGRES_PASSWORD: ${DB__PASSWORD:-change-me}
    POSTGRES_DB: ${DB__DB:-fastraygram}
  volumes:
    - ./database/postgres:/var/lib/postgresql/data
  command: *postgres-tuning
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
    interval: 5s
    timeout: 5s
    retries: 12
    start_period: 60s
  mem_limit: 512m
  memswap_limit: 512m
  restart: unless-stopped

services:
  postgres:
    <<: *postgres

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: fast-ray-gram
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      APP__HOST: 0.0.0.0
      APP__PORT: 8000
      DB__HOST: postgres
      DB__PORT: 5432
    volumes:
      - ./main.py:/app/main.py
      - ./src/api:/app/src/api
      - ./src/core:/app/src/core
      - ./src/models:/app/src/models
      - ./src/schemas:/app/src/schemas
      - ./src/services:/app/src/services
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: fast-ray-gram-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  invoice-worker:
    image: curlimages/curl:8.12.1
    container_name: fast-ray-gram-invoice-worker
    env_file:
      - .env
    environment:
      APP_URL: http://app:8000
      CHECK_INTERVAL_SEC: ${CHECK_INTERVAL_SEC:-30}
    volumes:
      - ./docker/invoice-worker.sh:/invoice-worker.sh:ro
    entrypoint: ["/bin/sh", "/invoice-worker.sh"]
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
